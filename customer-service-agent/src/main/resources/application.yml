server:
  port: 8081

spring:
  application:
    name: customer-service-agent
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:}
        enabled: true
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
    alibaba:
      a2a:
        nacos:
          server-addr: ${NACOS_ADDR:127.0.0.1:8848}
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:}
          discovery:
            enabled: true
          registry:
            enabled: true
        server:
          version: 1.0.0
          card:
            name: customer_service_agent
            description: 专业客服Agent，处理客户咨询、售后服务、地址查询、经纬度查询等问题
            provider:
              name: OneAsk
              organization: OneAsk
              url: https://github.com/oneask

app:
  baidu:
    map-ak: ${BAIDU_MAP_AK:}

logging:
  level:
    root: INFO
    com.oneask: DEBUG
    com.oneask.customer: TRACE
    com.alibaba.cloud.ai: DEBUG
    com.alibaba.cloud.ai.graph: TRACE
    com.alibaba.cloud.ai.graph.agent: TRACE
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
