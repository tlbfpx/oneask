server:
  port: 8082

spring:
  application:
    name: llm-routing-agent
  cloud:
    compatibility-verifier:
      enabled: false
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
    alibaba:
      a2a:
        nacos:
          server-addr: ${NACOS_ADDR:127.0.0.1:8848}
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:}
          discovery:
            enabled: true
          registry:
            enabled: false
        server:
          enabled: false

logging:
  level:
    root: INFO
    com.oneask: DEBUG
    com.oneask.routing: TRACE
    com.alibaba.cloud.ai: DEBUG
    com.alibaba.cloud.ai.graph: TRACE
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

customer-service:
  url: ${CUSTOMER_SERVICE_URL:http://localhost:8081}
